<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GANY PLUGINS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111113;
    --surface: #1a1a1d;
    --border: #252528;
    --border-hover: #3a3a3e;
    --accent: #e8e8ea;
    --accent-btn: #ffffff;
    --text: #d4d4d8;
    --text-dim: #6b6b72;
    --text-muted: #3d3d42;
    --tag-fl: #3a2e1e;
    --tag-fl-text: #b8864a;
    --tag-vst: #1e2a3a;
    --tag-vst-text: #4a7fb8;
    --tag-pack: #1e2e26;
    --tag-pack-text: #4a9970;
    --tag-preset: #28201e;
    --tag-preset-text: #a06050;
    --tag-outro: #232326;
    --tag-outro-text: #6b6b72;
  }

  /* Adicione as cores para a tag drumkit */
.tag-drumkit { background: #2e1e3a; color: #9c4ab8; }
:root {
  --tag-drumkit: #2e1e3a;
  --tag-drumkit-text: #9c4ab8;
}

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  a { text-decoration: none; color: inherit; }

  .wrap { max-width: 780px; margin: 0 auto; padding: 0 24px 80px; }

  header {
    padding: 52px 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .header-left p {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 300;
  }

  .db-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    margin-top: 6px;
    display: inline-block;
  }

  .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
  .search-wrap { flex: 1; position: relative; }

  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); font-size: 13px; pointer-events: none;
  }

  input[type="text"], input[type="url"], select, textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 9px 12px;
    outline: none; width: 100%; transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus, input[type="url"]:focus, select:focus { border-color: var(--border-hover); }
  .search-input { padding-left: 34px; }

  .btn {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 9px 16px; border-radius: 6px; border: 1px solid transparent;
    cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap; line-height: 1;
  }

  .btn-primary { background: var(--accent-btn); color: #111113; border-color: var(--accent-btn); }
  .btn-primary:hover { background: #d0d0d4; border-color: #d0d0d4; }
  .btn-ghost { background: transparent; color: var(--text-dim); border-color: var(--border); }
  .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

  .filters { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }

  .filter-pill {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 400;
    letter-spacing: 0.04em; padding: 5px 12px; border-radius: 100px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }

  .filter-pill:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-pill.active { background: var(--surface); border-color: var(--border-hover); color: var(--accent); }

  .list-header {
    display: grid; grid-template-columns: 1fr 130px 100px;
    padding: 0 12px 8px;
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }

  .links-list { display: flex; flex-direction: column; gap: 2px; }

  .link-row {
    display: grid; grid-template-columns: 1fr 130px 100px;
    align-items: center; padding: 13px 12px; border-radius: 6px;
    border: 1px solid transparent; transition: background 0.12s, border-color 0.12s;
    animation: fadeIn 0.2s ease;
  }

  .link-row:hover { background: var(--surface); border-color: var(--border); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .link-main { min-width: 0; }

  .link-name {
    font-size: 13px; font-weight: 500; color: var(--accent);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .link-sub { display: flex; align-items: center; gap: 8px; margin-top: 3px; }

  .cat-tag {
    font-family: 'DM Mono', monospace; font-size: 10px;
    font-weight: 400; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 3px;
  }

  .link-note {
    font-size: 11px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300;
  }

  .link-version { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); font-weight: 400; }

  .link-actions { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }

  .btn-icon {
    background: transparent; border: 1px solid transparent; color: var(--text-muted);
    border-radius: 5px; width: 28px; height: 28px; display: flex;
    align-items: center; justify-content: center; cursor: pointer;
    font-size: 12px; transition: all 0.12s; flex-shrink: 0;
  }

  .btn-icon:hover { background: var(--border); border-color: var(--border); color: var(--text); }
  .btn-icon.danger:hover { background: #2a1a1a; border-color: #3a2020; color: #cc5555; }

  .btn-dl {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    letter-spacing: 0.04em; padding: 6px 12px; border-radius: 5px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; transition: all 0.12s;
  }

  .btn-dl:hover { background: var(--border); border-color: var(--border-hover); }

  .empty { text-align: center; padding: 64px 0; color: var(--text-muted); }
  .empty p { font-size: 13px; margin-bottom: 20px; font-weight: 300; color: var(--text-dim); }

  .stats-row { display: flex; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }

  .stat-item { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .stat-item span { color: var(--text-dim); }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 50; display: flex; align-items: center; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.18s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #1a1a1d; border: 1px solid var(--border);
    border-radius: 10px; padding: 28px; width: 100%; max-width: 480px;
    transform: translateY(12px); transition: transform 0.18s;
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
    color: var(--accent); margin-bottom: 22px; letter-spacing: 0.02em;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block; font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--text-muted); letter-spacing: 0.06em;
    text-transform: uppercase; margin-bottom: 6px;
  }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  select option { background: #1a1a1d; }

  .modal-footer {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border);
  }

  .confirm-box {
    background: #1a1a1d; border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; max-width: 340px; width: 100%;
    transform: translateY(12px); transition: transform 0.18s;
  }

  .overlay.open .confirm-box { transform: translateY(0); }

  .confirm-box h3 {
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
    color: var(--accent); margin-bottom: 10px;
  }

  .confirm-box p { font-size: 12px; color: var(--text-dim); font-weight: 300; margin-bottom: 20px; line-height: 1.6; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .btn-delete {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 9px 16px; border-radius: 6px; background: #2a1a1a;
    border: 1px solid #3a2020; color: #cc5555; cursor: pointer; transition: all 0.15s;
  }

  .btn-delete:hover { background: #3a2020; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; font-family: 'DM Mono', monospace;
    padding: 11px 18px; border-radius: 6px; z-index: 100;
    transform: translateY(8px); opacity: 0; transition: all 0.2s; pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 560px) {
    .list-header { display: none; }
    .link-row { grid-template-columns: 1fr auto; }
    .link-version { display: none; }
    header { flex-direction: column; align-items: flex-start; }
    .field-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="header-left">
      <h1>GANY PLUGINS</h1>
      <p>Gerenciador de links de download</p>
      <span class="db-badge">sqlite · save.db</span>
    </div>
    <button class="btn btn-primary" onclick="openAdd()">+ Novo link</button>
  </header>

  <div class="stats-row" id="stats"></div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-input" id="search" placeholder="Buscar...">
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-pill active" data-f="all">Todos</button>
    <button class="filter-pill" data-f="fl-studio">FL Studio</button>
    <button class="filter-pill" data-f="vst">Plugins (VST)</button>
    <button class="filter-pill" data-f="drumkit">Drum Kits</button>
    <button class="filter-pill" data-f="pack">Sample Packs</button>
    <button class="filter-pill" data-f="preset">Presets</button>
  </div>

  <div class="list-header" id="list-header">
    <span>Nome</span>
    <span>Versão</span>
    <span></span>
  </div>

  <div class="links-list" id="list"></div>
</div>

<!-- Modal Adicionar/Editar -->
<div class="overlay" id="modal-overlay" onclick="onOverlayClick(event,'modal-overlay')">
  <div class="modal">
    <p class="modal-title" id="modal-title">Novo link</p>
    <div class="field">
      <label>Nome</label>
      <input type="text" id="f-name" placeholder="Ex: FL Studio 21 Producer Edition">
    </div>
    <div class="field">
      <label>URL</label>
      <input type="url" id="f-url" placeholder="https://...">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Categoria</label>
        <select id="f-cat">
            <option value="fl-studio">FL Studio</option>
            <option value="vst">Plugin (VST)</option>
            <option value="drumkit">Drum Kit</option>
            <option value="pack">Sample Pack</option>
            <option value="preset">Preset</option>
            <option value="outro">Outro</option>
        </select>
      </div>
      <div class="field">
        <label>Versão</label>
        <input type="text" id="f-version" placeholder="Ex: v21.2">
      </div>
    </div>
    <div class="field">
      <label>Nota</label>
      <input type="text" id="f-note" placeholder="Observações opcionais...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAll()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save" onclick="saveLink()">Salvar</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="overlay" id="confirm-overlay" onclick="onOverlayClick(event,'confirm-overlay')">
  <div class="confirm-box">
    <h3>Remover link</h3>
    <p>Esta ação não pode ser desfeita.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeAll()">Cancelar</button>
      <button class="btn-delete" onclick="doDelete()">Remover</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Constantes ────────────────────────────────────────────────────
const CATS = {
  'fl-studio': { label: 'FL Studio', bg: 'var(--tag-fl)',     color: 'var(--tag-fl-text)'     },
  'vst':       { label: 'VST',       bg: 'var(--tag-vst)',    color: 'var(--tag-vst-text)'    },
  'pack':      { label: 'Pack',      bg: 'var(--tag-pack)',   color: 'var(--tag-pack-text)'   },
  'preset':    { label: 'Preset',    bg: 'var(--tag-preset)', color: 'var(--tag-preset-text)' },
  'outro':     { label: 'Outro',     bg: 'var(--tag-outro)',  color: 'var(--tag-outro-text)'  },
};

let editId = null, delId = null, filter = 'all';

// ── API helpers ───────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

// ── Render ────────────────────────────────────────────────────────

async function render() {
  const q   = document.getElementById('search').value.trim();
  const params = new URLSearchParams({ q, cat: filter });

  let rows, stats;
  try {
    [rows, stats] = await Promise.all([
      api('GET', `/api/links?${params}`),
      api('GET', '/api/links/stats'),
    ]);
  } catch (e) {
    document.getElementById('list').innerHTML =
      `<div class="empty"><p>Erro ao conectar com o servidor.<br><small>${e.message}</small></p></div>`;
    return;
  }

  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="stat-item"><span>${stats.total  || 0}</span> total</div>
    <div class="stat-item"><span>${stats.fl     || 0}</span> FL Studio</div>
    <div class="stat-item"><span>${stats.vst    || 0}</span> plugins</div>
    <div class="stat-item"><span>${stats.pack   || 0}</span> packs</div>
  `;

  document.getElementById('list-header').style.display = rows.length ? '' : 'none';

  const el = document.getElementById('list');
  if (!rows.length) {
    el.innerHTML = `<div class="empty"><p>${q || filter !== 'all' ? 'Nenhum resultado encontrado.' : 'Nenhum link ainda.'}</p>${!q && filter === 'all' ? `<button class="btn btn-ghost" onclick="openAdd()">Adicionar primeiro link</button>` : ''}</div>`;
    return;
  }

  el.innerHTML = rows.map(l => {
    const c = CATS[l.cat] || CATS.outro;
    return `
    <div class="link-row">
      <div class="link-main">
        <div class="link-name">${esc(l.name)}</div>
        <div class="link-sub">
          <span class="cat-tag" style="background:${c.bg};color:${c.color}">${c.label}</span>
          ${l.note ? `<span class="link-note">${esc(l.note)}</span>` : ''}
        </div>
      </div>
      <div class="link-version">${esc(l.version || '—')}</div>
      <div class="link-actions">
        <button class="btn-icon" onclick="openEdit(${l.id})" title="Editar">✎</button>
        <button class="btn-icon danger" onclick="askDel(${l.id})" title="Remover">✕</button>
        <a href="${esc(l.url)}" target="_blank" rel="noopener">
          <button class="btn-dl">Baixar ↗</button>
        </a>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Modal ─────────────────────────────────────────────────────────

function openAdd() {
  editId = null;
  document.getElementById('modal-title').textContent = 'Novo link';
  ['f-name','f-url','f-version','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-cat').value = 'fl-studio';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}

async function openEdit(id) {
  editId = id;
  try {
    const l = await api('GET', `/api/links/${id}`);
    document.getElementById('modal-title').textContent = 'Editar link';
    document.getElementById('f-name').value    = l.name;
    document.getElementById('f-url').value     = l.url;
    document.getElementById('f-cat').value     = l.cat;
    document.getElementById('f-version').value = l.version || '';
    document.getElementById('f-note').value    = l.note    || '';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 80);
  } catch (e) { toast('Erro ao carregar link.'); }
}

async function saveLink() {
  const name    = document.getElementById('f-name').value.trim();
  const url     = document.getElementById('f-url').value.trim();
  const cat     = document.getElementById('f-cat').value;
  const version = document.getElementById('f-version').value.trim();
  const note    = document.getElementById('f-note').value.trim();
  if (!name || !url) { toast('Preencha nome e URL.'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;

  try {
    if (editId) {
      await api('PUT', `/api/links/${editId}`, { name, url, cat, version, note });
      toast('Link atualizado.');
    } else {
      await api('POST', '/api/links', { name, url, cat, version, note });
      toast('Link adicionado.');
    }
    closeAll();
    render();
  } catch (e) {
    toast(`Erro: ${e.message}`);
  } finally {
    btn.disabled = false;
  }
}

function askDel(id) {
  delId = id;
  document.getElementById('confirm-overlay').classList.add('open');
}

async function doDelete() {
  try {
    await api('DELETE', `/api/links/${delId}`);
    closeAll();
    render();
    toast('Link removido.');
  } catch (e) {
    toast(`Erro: ${e.message}`);
  }
}

function closeAll() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('open'));
  editId = null; delId = null;
}

function onOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeAll();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Filtros & busca ───────────────────────────────────────────────

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.dataset.f) return;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  filter = e.target.dataset.f;
  render();
});

let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200); // debounce 200ms
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(); });

// ── Boot ──────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
